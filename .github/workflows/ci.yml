name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests + migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Library/backend
    env:
      # Local dev/test runs on plaintext SQLite; production sets a real key.
      LIBRARY_REQUIRE_ENCRYPTION: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests (with coverage)
        run: python -m pytest -q -p no:warnings --cov=src --cov-report=term-missing
      - name: Validate migrations apply and reverse
        env:
          LIBRARY_DB_PATH: ci_migration_check.db
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Library/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Library/frontend/package-lock.json
      - run: npm ci
      - name: Type-check and build
        run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: Library/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Library/e2e/package-lock.json
      - name: Set up backend virtualenv
        working-directory: Library/backend
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt
      - name: Install e2e dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
